# See https://pre-commit.com for documentation.
#
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ── File hygiene (built-in community hooks) ──────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key

  # ── Markdown linting ────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  # ── Go quality gates (pre-commit stage) ─────────────────────────────────
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        description: Run golangci-lint on the entire project
        entry: golangci-lint run ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        description: Verify the project compiles clean
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        description: Run unit tests with the race detector
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false

  # ── Conventional commit enforcement (commit-msg stage) ──────────────────
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional commit message
        description: Require commit messages to follow Conventional Commits format
        entry: >-
          bash -c 'grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: |^Merge |^Revert " "$1" || { echo "ERROR: Commit message does not follow Conventional Commits format" >&2; echo "  Expected: type(optional-scope): description" >&2; echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert" >&2; exit 1; }' --
        language: system
        stages: [commit-msg]
