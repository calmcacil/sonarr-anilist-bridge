version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - bodyclose

  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
