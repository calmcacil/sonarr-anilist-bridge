services:
  sonarr-seasonal:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - seasonal-data:/data
    environment:
      # User/group to run as (default: 1000:1000)
      # Must match UID/GID of the Sonarr process for file access
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Prewarm current year's anime on startup (defaults to current year)
      # - PREWARM_YEARS=2026
      # Refresh mapping from upstream daily (default: 1)
      # - ALG_ANIBRIDGE_REFRESH_DAYS=1
      # Log level: debug, info, warn, error (default: info)
      # - LOG_LEVEL=debug

volumes:
  seasonal-data:
