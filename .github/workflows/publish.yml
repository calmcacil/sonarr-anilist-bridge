name: Build and publish Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'specs/**'
      - '.github/**'
      - 'testdata/**'
      - 'LICENSE'
      - 'NOTICE'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump: auto, patch, minor, major'
        required: false
        default: auto

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.svu.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest

      - name: Determine version
        id: svu
        run: |
          BUMP="${{ inputs.version_bump || 'auto' }}"
          if [ "$BUMP" = "auto" ]; then
            TAG=$(svu next)
          else
            TAG=$(svu "$BUMP")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Update CHANGELOG
        run: |
          TAG="${{ steps.svu.outputs.tag }}"
          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          [ "$LAST" = "$TAG" ] && echo "No new version, skipping" && exit 0

          VERSION="${TAG#v}"
          DATE=$(date +%Y-%m-%d)

          # Build new entry from conventional commits
          ENTRY=$(mktemp)
          {
            echo ""
            echo "## [$VERSION] — $DATE"
            echo ""

            for group in feat fix perf refactor docs test chore; do
              case "$group" in
                feat) LABEL="Added" ;;
                fix)  LABEL="Fixed" ;;
                perf|refactor|ci) LABEL="Changed" ;;
                docs) LABEL="Documentation" ;;
                test) LABEL="Testing" ;;
                chore) LABEL="Miscellaneous" ;;
              esac
            COMMITS=$(git log "${LAST}..HEAD" --oneline --format="%s" 2>/dev/null \
              | grep -iE "^$group(\\(.*\\))?:" || true)
            if [ -n "$COMMITS" ]; then
              echo "### $LABEL"
              echo "$COMMITS" | sed -E "s/^$group(\\(.*\\))?: *//i; s/ *\[skip ci\]//; s/ *\[ci skip\]//"
                echo ""
              fi
            done
          } > "$ENTRY"

          # Insert entry after the preamble (first blank line after the title block)
          awk '
            /^## / && !inserted { system("cat '"$ENTRY"'"); inserted=1 }
            { print }
            END { if (!inserted) system("cat '"$ENTRY"'") }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

          # Append version link
          echo "[$VERSION]: https://github.com/${{ github.repository }}/releases/tag/$TAG" >> CHANGELOG.md

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for $TAG [skip ci]" || true

      - name: Push CHANGELOG and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.svu.outputs.tag }}"
          git push origin HEAD:main
          git tag "$TAG" || true
          git push origin "$TAG"
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes || true

  docker:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ needs.version.outputs.tag }},enable=${{ needs.version.outputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ needs.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
